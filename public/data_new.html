<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Number Plate Data</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      margin: 20px;
    }
    h2 {
      color: #333;
    }
    #analytics {
      margin: 20px auto;
      font-size: 18px;
      color: #333;
    }
    #search-input, #time-filter, #date-input {
      display: block;
      margin: 10px auto;
      padding: 8px;
      width: 300px;
      font-size: 16px;
    }
    table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    .no-results {
      text-align: center;
      font-size: 18px;
      color: #900;
    }
    #generate-report {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 15px;
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .popup {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #28a745;
      color: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h2>Vehicle Number Plate Records</h2>
  
  <button id="generate-report">Generate Report</button>
  <input type="date" id="date-input" style="display:none;">
  <button id="download-pdf" style="display:none;">Download PDF</button>
  
  <div id="analytics">
    <p>Total Vehicles Detected: <span id="total-count">0</span></p>
  </div>
  
  <input type="text" id="search-input" placeholder="Search by number plate">
  
  <select id="time-filter">
    <option value="all">All Time</option>
    <option value="1">Last 1 Minute</option>
    <option value="5">Last 5 Minutes</option>
    <option value="30">Last 30 Minutes</option>
    <option value="60">Last 1 Hour</option>
    <option value="300">Last 5 Hours</option>
    <option value="1440">Last 1 Day</option>
    <option value="4320">Last 3 Days</option>
    <option value="10080">Last 1 Week</option>
    <option value="30240">Last 3 Weeks</option>
    <option value="43200">Last 1 Month</option>
    <option value="259200">Last 6 Months</option>
    <option value="525600">Last 1 Year</option>
  </select>
  
  <table>
    <thead>
      <tr>
        <th>Number Plate</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody id="vehicle-data"></tbody>
  </table>

  <script src="https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.3.1/firebase-database.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDA1qz6W_li3W4hFmVIBqbU06C0jD1URBE",
      authDomain: "notes-pro-f2823.firebaseapp.com",
      databaseURL: "https://notes-pro-f2823-default-rtdb.firebaseio.com/",
      projectId: "notes-pro-f2823",
      storageBucket: "notes-pro-f2823.appspot.com",
      messagingSenderId: "696364191325",
      appId: "1:696364191325:web:3c6a08544672b6874447b4",
      measurementId: "G-Z73ZBVWBH7"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    let allData = {};

    function renderTable(dataObj, newEntryKey = null) {
      const tableBody = document.getElementById("vehicle-data");
      tableBody.innerHTML = "";
      let count = 0;
      let rows = "";

      for (let key in dataObj) {
        count++;
        const row = `<tr ${key === newEntryKey ? 'style="background-color: #d4edda;"' : ''}>
                        <td>${dataObj[key].plate_text}</td>
                        <td>${dataObj[key].timestamp}</td>
                     </tr>`;
        rows = row + rows; // Prepend new data at the top
      }

      tableBody.innerHTML = rows;
      document.getElementById("total-count").textContent = count;
    }

    function fetchVehicleData() {
      const vehicleRef = ref(database, "vehicles");
      let firstLoad = true;

      onValue(vehicleRef, (snapshot) => {
        const newData = snapshot.val() || {};
        
        if (!firstLoad) {
          // Find the latest added key
          const newKeys = Object.keys(newData).filter(key => !(key in allData));
          if (newKeys.length > 0) {
            const newEntryKey = newKeys[0];
            showPopup(`New Vehicle Detected: ${newData[newEntryKey].plate_text}`);
            renderTable(newData, newEntryKey);
          }
        } else {
          renderTable(newData);
          firstLoad = false;
        }

        allData = newData;
      });
    }

    function showPopup(message) {
      const popup = document.createElement("div");
      popup.textContent = message;
      popup.classList.add("popup");
      
      document.body.appendChild(popup);
      setTimeout(() => {
        popup.remove();
      }, 3000); // Remove after 3 seconds
    }

    document.getElementById("search-input").addEventListener("input", function() {
      const searchTerm = this.value.toLowerCase();
      const filteredData = Object.fromEntries(Object.entries(allData).filter(([_, v]) => v.plate_text.toLowerCase().includes(searchTerm)));
      renderTable(filteredData);
    });

    fetchVehicleData();
  </script>
</body>
</html>
