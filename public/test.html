<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* Profile Icon Styles */
.profile-container {
    position: relative;
    display: inline-block;
}

.profile-icon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.profile-icon:hover {
    transform: scale(1.1);
}

/* Dropdown Menu Styles */
.profile-dropdown {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    width: 180px;
    display: none;
    z-index: 100;
}

.profile-dropdown a {
    display: block;
    padding: 10px 15px;
    text-align: center;
    color: #333;
    text-decoration: none;
    font-weight: bold;
    transition: background 0.3s ease;
}

.profile-dropdown a:hover {
    background: #f4a261;
    color: #fff;
}

/* Show dropdown when active */
.profile-container.active .profile-dropdown {
    display: block;
}


    </style>
</head>
<body>
  
    <div class="profile-container">
        <img src="assets/images/Admin.png" alt="Profile" class="profile-icon" onclick="toggleDropdown()">
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="create_profile.php">Create Profile</a>
            <a href="view_profile.php" id="viewProfile" style="display: none;">View Profile</a>
            <a href="logout.php">Log Out</a>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            document.getElementById("dropdownMenu").classList.toggle("show");
        }

        document.addEventListener("click", function(event) {
            if (!event.target.closest(".profile-container")) {
                document.getElementById("dropdownMenu").classList.remove("show");
            }
        });

        // Simulating profile check (Replace with actual backend check)
        let profileExists = true; // Change to false if profile is not created
        if (profileExists) {
            document.getElementById("viewProfile").style.display = "block";
        }
    </script>
</body>
</html>
